databaseChangeLog:

  # ============================================================================
  # CAMADA 4: DADOS DERIVADOS DO PARSING
  # Output direto do BPMNFlow ModelParser: stages, activities, conclusions,
  # rules e inconsistencies. Dados desnormalizados para consulta rápida.
  # process_activity.element_id links this layer to Layer 3.
  # ============================================================================

  - changeSet:
      id: 010-create-bpmn-stage
      author: jefersonferr
      comment: Stages extraídos das lanes do workflow (workflow.getStages())
      changes:
        - createTable:
            tableName: process_stage
            remarks: Stages extraídos das lanes via workflow.getStages()
            columns:
              - column:
                  name: stage_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_process_stage
                    nullable: false
              - column:
                  name: version_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_stage_version
                    references: bpmn_process_version(version_id)
              - column:
                  name: code
                  type: VARCHAR(100)
                  remarks: 'Código do stage (ex: CS, SC, CH, DL)'
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(400)
                  remarks: 'Nome legível do stage (ex: Customer, Pizza Chef)'
              - column:
                  name: display_order
                  type: INT
        - addUniqueConstraint:
            tableName: process_stage
            columnNames: version_id, code
            constraintName: uk_pstage_ver_code

  - changeSet:
      id: 011-create-bpmn-activity
      author: jefersonferr
      comment: Activities extraídas pelo BPMNFlow (workflow.getActivities())
      changes:
        - createTable:
            tableName: process_activity
            remarks: Activities derivadas pelo BPMNFlow parser
            columns:
              - column:
                  name: activity_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_process_activity
                    nullable: false
              - column:
                  name: version_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_act_version
                    references: bpmn_process_version(version_id)
              - column:
                  name: element_id
                  type: BIGINT
                  remarks: FK para bpmn_element — liga a activity derivada ao elemento estrutural de origem
                  constraints:
                    foreignKeyName: fk_act_element
                    references: bpmn_element(element_id)
              - column:
                  name: name
                  type: VARCHAR(400)
              - column:
                  name: abbreviation
                  type: VARCHAR(100)
                  remarks: 'stageCode-activityCode (ex: CS-SEL, CH-BAK)'
                  constraints:
                    nullable: false
              - column:
                  name: stage_code
                  type: VARCHAR(100)
                  remarks: 'Código do stage pai (ex: CS, CH)'
              - column:
                  name: lane_name
                  type: VARCHAR(400)
              - column:
                  name: display_order
                  type: INT
        - addUniqueConstraint:
            tableName: process_activity
            columnNames: version_id, abbreviation
            constraintName: uk_pact_ver_abbr
        - createIndex:
            tableName: process_activity
            indexName: idx_pact_stage
            columns:
              - column:
                  name: version_id
              - column:
                  name: stage_code

  - changeSet:
      id: 012-create-bpmn-conclusion
      author: jefersonferr
      comment: Conclusões possíveis para cada activity
      changes:
        - createTable:
            tableName: process_conclusion
            remarks: Conclusões possíveis por activity (saídas do exclusive gateway)
            columns:
              - column:
                  name: conclusion_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_process_conclusion
                    nullable: false
              - column:
                  name: activity_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_concl_activity
                    references: process_activity(activity_id)
              - column:
                  name: code
                  type: VARCHAR(200)
                  remarks: 'Código da conclusão (ex: ORDER_CONFIRMED, NEEDS_ATTENTION)'
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(400)
                  remarks: 'Nome legível da conclusão (ex: Order confirmed)'
        - addUniqueConstraint:
            tableName: process_conclusion
            columnNames: activity_id, code
            constraintName: uk_pconcl_act_code

  - changeSet:
      id: 013-create-bpmn-rule
      author: jefersonferr
      comment: Regras de transição derivadas pelo BPMNFlow (workflow.getRules())
      changes:
        - createTable:
            tableName: process_rule
            remarks: Regras de transição entre activities derivadas pelo parser
            columns:
              - column:
                  name: rule_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_process_rule
                    nullable: false
              - column:
                  name: version_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rule_version
                    references: bpmn_process_version(version_id)
              - column:
                  name: rule_type
                  type: VARCHAR(50)
                  remarks: START_TO_TASK, TASK_TO_TASK, TASK_TO_END, SPLIT_TO_TASK, SPLIT_TO_END, MERGE_TO_TASK, MERGE_TO_END, TASK_TO_SPLIT, TASK_TO_MERGE
                  constraints:
                    nullable: false
              - column:
                  name: source_activity_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_rule_src_act
                    references: process_activity(activity_id)
              - column:
                  name: target_activity_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_rule_tgt_act
                    references: process_activity(activity_id)
              - column:
                  name: source_abbreviation
                  type: VARCHAR(100)
                  remarks: Abbreviation da activity de origem (null para START_TO_TASK)
              - column:
                  name: target_abbreviation
                  type: VARCHAR(100)
                  remarks: Abbreviation da activity de destino (null para TASK_TO_END)
              - column:
                  name: conclusion_code
                  type: VARCHAR(200)
                  remarks: Código da conclusão que dispara esta transição
              - column:
                  name: process_status
                  type: VARCHAR(200)
                  remarks: Status resultante do processo após esta transição
        - createIndex:
            tableName: process_rule
            indexName: idx_prule_src
            columns:
              - column:
                  name: version_id
              - column:
                  name: source_abbreviation
        - createIndex:
            tableName: process_rule
            indexName: idx_prule_concl
            columns:
              - column:
                  name: version_id
              - column:
                  name: conclusion_code
        - createIndex:
            tableName: process_rule
            indexName: idx_prule_status
            columns:
              - column:
                  name: version_id
              - column:
                  name: process_status
        - createIndex:
            tableName: process_rule
            indexName: idx_prule_type
            columns:
              - column:
                  name: version_id
              - column:
                  name: rule_type

  - changeSet:
      id: 014-create-bpmn-inconsistency
      author: jefersonferr
      comment: Inconsistências detectadas pelo BPMNFlow durante o parsing
      changes:
        - createTable:
            tableName: process_inconsistency
            remarks: Inconsistências da validação contra o metamodelo
            columns:
              - column:
                  name: inconsistency_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bpmn_incon
                    nullable: false
              - column:
                  name: version_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_incon_version
                    references: bpmn_process_version(version_id)
              - column:
                  name: inc_type
                  type: VARCHAR(100)
                  remarks: Tipo da inconsistência do BPMNFlow
                  constraints:
                    nullable: false
              - column:
                  name: element_bpmn_id
                  type: VARCHAR(200)
                  remarks: BPMN ID do elemento que gerou a inconsistência
              - column:
                  name: element_type
                  type: VARCHAR(50)
              - column:
                  name: property_name
                  type: VARCHAR(200)
                  remarks: Propriedade ausente ou inválida, se aplicável
              - column:
                  name: description
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: process_inconsistency
            indexName: idx_pincon_type
            columns:
              - column:
                  name: version_id
              - column:
                  name: inc_type
