databaseChangeLog:

  # ============================================================================
  # LAYER 2: PROCESS AND VERSIONING
  # Logical definition of the business process and its versions.
  # Each .bpmn deploy generates a new version with the original XML
  # preserved for full traceability.
  # ============================================================================

  - changeSet:
      id: 003-create-bpmn-process
      author: jefersonferr
      comment: Immutable logical definition of the business process
      changes:
        - createTable:
            tableName: bpmn_process
            remarks: 'Logical process definition (e.g. Pizza Delivery, Loan Approval)'
            columns:
              - column:
                  name: process_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bpmn_process
                    nullable: false
              - column:
                  name: process_key
                  type: VARCHAR(200)
                  remarks: 'Unique functional identifier (e.g. PIZZA_DELIVERY)'
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(400)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: bpmn_process
            columnNames: process_key
            constraintName: uk_bpmn_process_key

  - changeSet:
      id: 004-create-bpmn-process-version
      author: jefersonferr
      comment: Each published version of a process with the original XML and a reference to its config
      changes:
        - createTable:
            tableName: bpmn_process_version
            remarks: Specific version of a process with parsed data
            columns:
              - column:
                  name: version_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bpmn_proc_ver
                    nullable: false
              - column:
                  name: process_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proc_ver_process
                    references: bpmn_process(process_id)
              - column:
                  name: config_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proc_ver_config
                    references: bpmn_config(config_id)
              - column:
                  name: version_number
                  type: INT
                  remarks: Sequential number within the process (1, 2, 3...)
                  constraints:
                    nullable: false
              - column:
                  name: version_tag
                  type: VARCHAR(50)
                  remarks: 'Camunda Modeler tag (camunda:versionTag)'
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  remarks: Lifecycle status — DRAFT, ACTIVE, DEPRECATED, ARCHIVED
                  constraints:
                    nullable: false
              - column:
                  name: process_type
                  type: VARCHAR(100)
                  remarks: process_type extension property from the participant/process element
              - column:
                  name: process_subtype
                  type: VARCHAR(100)
                  remarks: process_subtype extension property from the participant/process element
              - column:
                  name: documentation
                  type: CLOB
              - column:
                  name: bpmn_xml
                  type: CLOB
                  remarks: Full original XML of the .bpmn file
                  constraints:
                    nullable: false
              - column:
                  name: is_valid
                  type: BOOLEAN
                  defaultValueBoolean: true
                  remarks: true if no inconsistencies were generated during parsing
                  constraints:
                    nullable: false
              - column:
                  name: parsed_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: bpmn_process_version
            columnNames: process_id, version_number
            constraintName: uk_proc_ver_num
        - createIndex:
            tableName: bpmn_process_version
            indexName: idx_proc_ver_status
            columns:
              - column:
                  name: process_id
              - column:
                  name: status