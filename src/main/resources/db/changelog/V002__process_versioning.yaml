databaseChangeLog:

  # ============================================================================
  # CAMADA 2: PROCESSO E VERSIONAMENTO
  # Definição lógica do processo de negócio e suas versões.
  # Cada deploy de um .bpmn gera uma nova versão com o XML original
  # preservado para rastreabilidade completa.
  # ============================================================================

  - changeSet:
      id: 003-create-bpmn-process
      author: jefersonferr
      comment: Definição lógica imutável do processo de negócio
      changes:
        - createTable:
            tableName: bpmn_process
            remarks: 'Definição lógica do processo (ex: Pizza Delivery, Loan Approval)'
            columns:
              - column:
                  name: process_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bpmn_process
                    nullable: false
              - column:
                  name: process_key
                  type: VARCHAR(200)
                  remarks: 'Identificador funcional único (ex: PIZZA_DELIVERY)'
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(400)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: bpmn_process
            columnNames: process_key
            constraintName: uk_bpmn_process_key

  - changeSet:
      id: 004-create-bpmn-process-version
      author: jefersonferr
      comment: Cada versão publicada de um processo com XML original e referência ao config
      changes:
        - createTable:
            tableName: bpmn_process_version
            remarks: Versão específica de um processo com dados do parsing
            columns:
              - column:
                  name: version_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_bpmn_proc_ver
                    nullable: false
              - column:
                  name: process_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proc_ver_process
                    references: bpmn_process(process_id)
              - column:
                  name: config_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proc_ver_config
                    references: bpmn_config(config_id)
              - column:
                  name: version_number
                  type: INT
                  remarks: Sequencial dentro do processo (1, 2, 3...)
                  constraints:
                    nullable: false
              - column:
                  name: version_tag
                  type: VARCHAR(50)
                  remarks: 'Tag do Camunda Modeler (camunda:versionTag)'
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: DRAFT
                  remarks: Ciclo de vida — DRAFT, ACTIVE, DEPRECATED, ARCHIVED
                  constraints:
                    nullable: false
              - column:
                  name: process_type
                  type: VARCHAR(100)
                  remarks: Extension property process_type do participant/process
              - column:
                  name: process_subtype
                  type: VARCHAR(100)
                  remarks: Extension property process_subtype do participant/process
              - column:
                  name: documentation
                  type: CLOB
              - column:
                  name: bpmn_xml
                  type: CLOB
                  remarks: XML original completo do arquivo .bpmn
                  constraints:
                    nullable: false
              - column:
                  name: is_valid
                  type: BOOLEAN
                  defaultValueBoolean: true
                  remarks: true se nenhuma inconsistency foi gerada no parsing
                  constraints:
                    nullable: false
              - column:
                  name: parsed_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: bpmn_process_version
            columnNames: process_id, version_number
            constraintName: uk_proc_ver_num
        - createIndex:
            tableName: bpmn_process_version
            indexName: idx_proc_ver_status
            columns:
              - column:
                  name: process_id
              - column:
                  name: status
