server:
  port: 8080

spring:
  application:
    name: bpmnflow-process-runtime

  # ----- JPA / Hibernate -----
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none      # Liquibase manages the schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16

  # ----- Liquibase -----
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ----- Jackson -----
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true

# ----- BPMNFlow Starter -----
bpmnflow:
  model-path: classpath:pizza-delivery.bpmn
  config-path: classpath:bpmn-config.yaml
  expose-api: true

# ----- Swagger -----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  paths-to-exclude: /process/model

---
# =============================================================================
# H2 profile — run locally without relational database
# Usage: -Dspring.profiles.active=h2
# Data persists in ~/bpmnflow-runtime.mv.db between restarts.
# Use MODE=Oracle for closest SQL compatibility.
# Switch to jdbc:h2:mem:bpmnflow for a clean slate on every restart.
# =============================================================================
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:file:~/bpmnflow-runtime;MODE=Oracle;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console